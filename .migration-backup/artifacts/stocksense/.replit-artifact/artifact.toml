kind = "web"
previewPath = "/"
title = "StockSense Landing Page"
version = "1.0.0"
id = "artifacts/stocksense"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19067

[services.development]
run = "pnpm --filter @workspace/stocksense run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/stocksense", "run", "build" ]
publicDir = "artifacts/stocksense/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19067"
BASE_PATH = "/"
